<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../ranking-styles.css">
</head>
<body>
    <div class="ranking-card">
        <!-- 榜单头部 -->
        <div class="ranking-card-header">
            <div class="ranking-card-title">
                <span class="ranking-card-icon">🎬</span>
                <span>Image to Video</span>
            </div>
            <div class="ranking-card-description">
                将静态图像转换为动态视频内容的AI模型在流畅性和质量方面的综合排名
            </div>
            <div class="ranking-card-filters">
                <button class="filter-tag active" data-filter="all">全部</button>
                <button class="filter-tag" data-filter="chinese">中国</button>
            </div>
        </div>

        <!-- 榜单表格 -->
        <div class="ranking-table-wrapper">
            <table class="ranking-table">
                <thead>
                    <tr>
                        <th class="col-rank">排名</th>
                        <th class="col-model">模型</th>
                        <th class="col-company">公司</th>
                        <th class="col-score">分数</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- 数据将从JS文件加载 -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="../data/image-to-video.js"></script>
    <script src="../ranking-script.js"></script>
</body>
</html>
