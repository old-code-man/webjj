<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../ranking-styles.css">
</head>
<body>
    <div class="ranking-card">
        <!-- 榜单头部 -->
        <div class="ranking-card-header">
            <div class="ranking-card-title">
                <span class="ranking-card-icon">⚡</span>
                <span>高频词元榜</span>
            </div>
            <div class="ranking-card-filters">
                <button class="filter-tag" data-filter="all">全部</button>
                <button class="filter-tag active" data-filter="today">今日</button>
                <button class="filter-tag" data-filter="week">本周</button>
            </div>
        </div>

        <!-- 榜单表格 -->
        <div class="ranking-table-wrapper">
            <table class="ranking-table">
                <thead>
                    <tr>
                        <th class="col-rank">排名</th>
                        <th class="col-name">词元名称</th>
                        <th class="col-score">频率</th>
                        <th class="col-usage">出现次数</th>
                        <th class="col-trend">趋势</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- 数据将从YAML文件加载 -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="../data/freq-ranking.js"></script>
    <script src="../ranking-script.js"></script>
</body>
</html>
